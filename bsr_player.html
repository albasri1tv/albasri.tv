<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTV PLAYER</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-gradient: linear-gradient(135deg, #00c6ff, #0072ff);
        --danger-color: #ff4b4b;
        --bg-glass: rgba(255, 255, 255, 0.05);
        --border-glass: rgba(255, 255, 255, 0.1);
    }

    body {
        margin: 0;
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        background-attachment: fixed;
        color: #fff;
        min-height: 100vh;
    }

    /* الحاوية الرئيسية */
    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    /* الشريط العلوي */
    .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 25px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-glass);
        border-radius: 16px;
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .top-nav .menu-icon {
        font-size: 24px;
        cursor: pointer;
        transition: 0.3s;
    }
    
    .top-nav .menu-icon:hover { color: #00c6ff; text-shadow: 0 0 10px rgba(0,198,255,0.5); }
    .top-nav .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* القائمة الجانبية */
    #sideMenu {
        position: fixed;
        right: -280px;
        top: 0;
        width: 280px;
        height: 100%;
        background: rgba(15, 15, 25, 0.95);
        border-left: 1px solid var(--border-glass);
        backdrop-filter: blur(20px);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 2000;
        padding-top: 80px;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    
    #sideMenu.active { right: 0; }
    #sideMenu a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; font-size: 16px; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #sideMenu a:hover { background: rgba(255,255,255,0.1); padding-right: 35px; color: #00c6ff; }
    .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
    .social-links a { border: none !important; padding: 0 !important; font-size: 24px; }

    /* البطاقات */
    .card {
        background: var(--bg-glass);
        border: 1px solid var(--border-glass);
        border-radius: 20px;
        padding: 30px;
        backdrop-filter: blur(15px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s;
    }
    .card:hover { border-color: rgba(255,255,255,0.2); }
    .card h2 { text-align: center; margin-top: 0; margin-bottom: 25px; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

    /* المدخلات */
    .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .input-group label { font-weight: 600; font-size: 15px; color: #ccc; }
    
    input, select, textarea {
        width: 100%;
        font-family: 'Cairo', sans-serif;
        font-size: 15px;
        padding: 14px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
        transition: 0.3s;
        box-sizing: border-box;
    }
    
    input:focus, select:focus, textarea:focus {
        border-color: #00c6ff;
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 15px rgba(0, 198, 255, 0.2);
        outline: none;
    }
    
    select option { background: #1a2a32; color: #fff; }

    /* الأزرار */
    .btn-primary {
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--primary-gradient);
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        font-family: 'Cairo', sans-serif;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 114, 255, 0.5); }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

    /* سيرفرات القنوات (البلوكات) */
    .server-block {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 20px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        transition: 0.3s;
        position: relative;
        overflow: hidden;
    }
    .server-block:hover { border-color: rgba(0,198,255,0.3); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    .server-block::before { content:''; position:absolute; top:0; right:0; width:4px; height:100%; background:var(--primary-gradient); }
    
    .server-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    .server-header h3 { margin: 0; font-size: 18px; color: #00c6ff; }
    
    .delete-btn {
        background: rgba(255, 75, 75, 0.1); color: var(--danger-color); border: 1px solid rgba(255, 75, 75, 0.2);
        width: 35px; height: 35px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        display: flex; justify-content: center; align-items: center;
    }
    .delete-btn:hover { background: var(--danger-color); color: #fff; box-shadow: 0 0 15px rgba(255, 75, 75, 0.4); }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Responsive */
    @media (max-width: 768px) {
        .input-grid { grid-template-columns: 1fr; }
        .btn-group { grid-template-columns: 1fr; }
        .card { padding: 20px; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div class="logo"><i class="fas fa-play-circle"></i> BTV PLAYER</div>
        <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>

    <div id="sideMenu">
        <a href="https://play.google.com/store/apps/details?id=com.btv.video.player&hl=ar"><i class="fab fa-google-play"></i> تحميل المشغل</a>
        <a href="#"><i class="fas fa-code"></i> توليد JSON</a>
        <a href="#"><i class="fas fa-play"></i> Play Button</a>
        <div class="social-links">
            <a href="https://t.me/lbsplayer" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://www.instagram.com/a_l__i19/" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-cogs"></i> لوحة التحكم والتوليد</h2>

        <div class="input-group">
            <label>أدخل كود JSON المشفر:</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="encodedInput" placeholder="الصق الكود المشفر هنا لفكه...">
                <button onclick="decodeAndFill()" class="btn-primary" style="white-space:nowrap;"><i class="fas fa-unlock-alt"></i> فك التشفير</button>
            </div>
        </div>

        <div id="jsonContainer" style="display:flex; flex-direction:column; gap:20px;"></div>

        <div class="btn-group">
            <button onclick="addBlock()" class="btn-primary"><i class="fas fa-plus-circle"></i> إضافة قناة / سيرفر</button>
            <button onclick="updateJson()" class="btn-primary" style="background: linear-gradient(135deg, #11998e, #38ef7d);"><i class="fas fa-sync-alt"></i> تحديث الكود</button>
        </div>

        <hr style="border:0; height:1px; background:var(--border-glass); margin:30px 0;">

        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط Intent النهائي:</label>
            <textarea id="intentCode" rows="3" readonly style="direction:ltr; text-align:left;"></textarea>
            <button onclick="copyIntentCode()" class="btn-primary"><i class="fas fa-copy"></i> نسخ كود Intent</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-code"></i> كود زر التشغيل للموقع (Play Button)</h2>
        <div class="input-group">
            <textarea id="playCode" rows="10" readonly style="direction:ltr; text-align:left; font-family:monospace;"></textarea>
            <button onclick="copyPlayCode()" class="btn-primary"><i class="fas fa-copy"></i> نسخ كود HTML</button>
        </div>
    </div>
</div>

<script>
let counter = 0;

function toggleMenu() {
    const menu = document.getElementById('sideMenu');
    menu.classList.toggle('active');
}

// إخفاء القائمة عند الضغط خارجها
document.addEventListener('click', function(event) {
    const menu = document.getElementById('sideMenu');
    const button = document.querySelector('.fa-bars');
    if (!menu.contains(event.target) && !button.contains(event.target)) {
        menu.classList.remove('active');
    }
});

function addBlock() {
    counter++;
    const container = document.createElement('div');
    container.className = 'server-block';
    container.id = `block${counter}`;
    container.innerHTML = `
        <div class="server-header">
            <h3><i class="fas fa-server"></i> سيرفر ${counter}</h3>
            <button onclick="deleteBlock(${counter})" class="delete-btn" title="حذف"><i class="fas fa-trash"></i></button>
        </div>
        <div class="input-grid">
            <input type="text" id="name_server${counter}" placeholder="اسم السيرفر" oninput="updateJson()">
            <input type="text" id="url_channel${counter}" placeholder="الرابط (URL)" oninput="updateJson()" style="direction:ltr;">
            <input type="text" id="userAgent${counter}" placeholder="User Agent" oninput="updateJson()">
            <input type="text" id="referer${counter}" placeholder="Referer" oninput="updateJson()" style="direction:ltr;">
            <input type="text" id="drm_key${counter}" placeholder="Clearkey (DRM)" oninput="updateJson()" style="direction:ltr;">
            <input type="text" id="origin${counter}" placeholder="Origin" oninput="updateJson()" style="direction:ltr;">
            <select id="type_player${counter}" onchange="updateJson()" style="grid-column: 1 / -1;">
                <option value="bsr_player_exo">EXO Player</option>
                <option value="bsr_player_web">WEB Player</option>
                <option value="bsr_player_m3u">M3U Playlist</option>
            </select>
        </div>
    `;
    document.getElementById('jsonContainer').appendChild(container);
    updateJson();
}

function deleteBlock(id) {
    document.getElementById(`block${id}`).remove();
    updateJson();
}

function updateJson() {
    const blocks = document.querySelectorAll('#jsonContainer > div[id^="block"]');
    const jsonData = [];
    let prefix = 'bsr_player_exo';
    
    blocks.forEach(block => {
        const inputs = block.querySelectorAll('input,select');
        jsonData.push({
            name_server: inputs[0].value,
            url_channel: inputs[1].value,
            userAgent: inputs[2].value,
            referer: inputs[3].value,
            drm_key: inputs[4].value,
            origin: inputs[5].value,
            type_player: inputs[6].value
        });
        prefix = inputs[6].value || 'bsr_player_exo';
    });
    
    const jsonString = JSON.stringify(jsonData);
    const encoded = btoa(unescape(encodeURIComponent(jsonString))); 
    const finalEncodedCode = prefix + encoded;
    
    document.getElementById('intentCode').value = `intent://${finalEncodedCode}#Intent;scheme=xmtv;package=com.btv.video.player;end`;
    document.getElementById('playCode').value = `<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV</title>
<style>
body { margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);font-family:'Cairo',sans-serif;}
.play-btn { width:150px; height:150px; border-radius:50%; border:none; cursor:pointer; background:linear-gradient(135deg,#ff512f,#dd2476); box-shadow:0 0 30px rgba(255,81,47,0.6),0 0 60px rgba(221,36,118,0.5); display:flex; justify-content:center; align-items:center; transition:transform 0.3s ease; position:relative; animation:pulse 2s infinite;}
.play-btn::before { content:''; display:block; width:0; height:0; border-left:35px solid #fff; border-top:20px solid transparent; border-bottom:20px solid transparent; margin-left:15px;}
@keyframes pulse {0%{box-shadow:0 0 20px rgba(255,81,47,0.5);}50%{box-shadow:0 0 50px rgba(255,81,47,0.8),0 0 80px rgba(221,36,118,0.6);}100%{box-shadow:0 0 20px rgba(255,81,47,0.5);}}
.play-btn:hover { transform:scale(1.1); box-shadow:0 0 60px rgba(255,81,47,0.9),0 0 100px rgba(221,36,118,0.8);}
@media (max-width:480px){.play-btn { width:120px; height:120px; }}
</style>
</head>
<body>
<button class="play-btn" onclick="window.location.replace('intent://${finalEncodedCode}#Intent;scheme=xmtv;package=com.btv.video.player;end')"></button>
</body>
</html>`;
}

function decodeAndFill() {
    const input = document.getElementById('encodedInput').value;
    const prefixList = ['com.btv.video.player', 'bsr_player_web', 'bsr_player_m3u', 'bsr_player_exo'];
    const prefix = prefixList.find(p => input.startsWith(p));
    
    if (!prefix) {
        alert("يرجى إدخال كود صحيح.");
        return;
    }
    
    const base64String = input.replace(prefix, '');
    try {
        const jsonData = JSON.parse(decodeURIComponent(escape(atob(base64String))));
        document.getElementById('jsonContainer').innerHTML = '';
        counter = 0;
        jsonData.forEach((data, index) => {
            addBlock();
            const inputs = document.querySelectorAll(`#block${index + 1} input, #block${index + 1} select`);
            inputs[0].value = data.name_server || '';
            inputs[1].value = data.url_channel || '';
            inputs[2].value = data.userAgent || '';
            inputs[3].value = data.referer || '';
            inputs[4].value = data.drm_key || '';
            inputs[5].value = data.origin || '';
            inputs[6].value = data.type_player || 'bsr_player_exo';
        });
        updateJson();
    } catch(e) {
        alert("خطأ في فك الترميز.");
    }
}

function copyIntentCode() {
    const t = document.getElementById('intentCode');
    t.select();
    document.execCommand('copy');
    alert("تم نسخ كود Intent بنجاح!");
}

function copyPlayCode() {
    const t = document.getElementById('playCode');
    t.select();
    document.execCommand('copy');
    alert("تم نسخ كود زر التشغيل بنجاح!");
}

// إضافة بلوك افتراضي عند فتح الصفحة
window.onload = () => {
    addBlock();
};
</script>
</body>
</html>
