<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ALBASRI TV | الموقع الرسمي لتحميل تطبيق البصري</title>
    <meta name="description" content="حمل الآن تطبيق البصري تي في (ALBASRI TV) لمشاهدة أقوى المحتويات الرياضية والتقنية. الموقع يوفر أيضاً مشغل البصري برو وخدمات البث المباشر.">
    <meta name="keywords" content="البصري تي في, ALBASRI TV, تحميل تطبيق البصري, تطبيق Basri Pro, مشغل BSR Player, تطبيق قنوات رياضة, تطبيق بث مباشر, روميو">
    <meta name="author" content="Romeo">
    <link rel="canonical" href="https://albasri1tv.github.io/albasri.tv/" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #030712;
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #9ca3af;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top right, #0b214d 0%, #030712 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 45px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        /* تأثير إضاءة علوي */
        .main-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand-logo {
            width: 110px;
            height: 110px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 2px solid var(--primary);
            padding: 6px;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        h1 { font-size: 26px; font-weight: 900; margin: 10px 0; background: linear-gradient(to left, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 14px; color: var(--text-dim); margin-bottom: 30px; }

        /* معرض الصور المصغر */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }
        .preview-grid img {
            width: 100%;
            aspect-ratio: 9/16;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid var(--border);
        }
        .preview-grid img:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* الأزرار الاحترافية */
        .actions-group { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-main {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            padding: 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }

        .btn-sub {
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-sub:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        /* نظام ربط الصفحات للأرشفة */
        .services-nav {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .services-nav h3 { font-size: 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .nav-links { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-item {
            font-size: 12px;
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }
        .nav-item:hover { background: var(--primary); color: #000; }

        /* صندوق الكود */
        .code-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 25px;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }
        .code-section label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
        .code-badge {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 5px;
            cursor: pointer;
            display: block;
        }
        .copy-status { font-size: 11px; color: var(--primary); margin-top: 10px; display: block; height: 15px; }

        footer { margin-top: 35px; font-size: 11px; color: #444; font-weight: 700; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="https://up6.cc/2026/04/177610707754814.jpg" alt="ALBASRI TV Logo" class="brand-logo">
    
    <h1>البصري تيفي ALBASRI TV</h1>
    <p class="tagline">بوابتك الرسمية لعالم التقنية والرياضة</p>

    <div class="preview-grid">
        <img src="https://up6.cc/2026/04/177610707742171.jpg" alt="Preview 1">
        <img src="https://up6.cc/2026/04/177610707751573.jpg" alt="Preview 2">
        <img src="https://up6.cc/2026/04/177610707748052.jpg" alt="Preview 3">
    </div>

    <div class="actions-group">
        <a href="https://www.mediafire.com/file/aqv1m6qldnd3k7h/ALBASRI+TV.apk/file" class="btn-main">
            <i class="fab fa-android"></i> تحميل تطبيق الموبايل (APK)
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.btv.video.player&hl=ar" class="btn-sub">
            <i class="fas fa-play"></i> تحميل المشغل المعتمد
        </a>
    </div>

    <div class="services-nav">
        <h3>خدمات الويب المتوفرة</h3>
        <div class="nav-links">
            <a href="tv.html" class="nav-item"><i class="fas fa-tv"></i> مسلسلات وفلام </a>
            <a href="Basri_Pro_Player.html" class="nav-item"><i class="fas fa-bolt"></i> Basri Pro</a>
            <a href="bsr_player.html" class="nav-item"><i class="fas fa-globe"></i> BTV Player</a>
        </div>
    </div>

    <div class="code-section">
        <label><i class="fas fa-desktop"></i> كود تحميل نسخة الشاشات (Downloader)</label>
        <div class="code-badge" id="tvCode" onclick="copyCode()">1962664</div>
        <span class="copy-status" id="statusMsg">اضغط على الكود للنسخ السريع</span>
    </div>

    <footer>
        DESIGNED BY ROMEO &copy; 2026
    </footer>
</div>

<script>
    function copyCode() {
        const code = document.getElementById('tvCode').innerText;
        navigator.clipboard.writeText(code);
        
        const msg = document.getElementById('statusMsg');
        msg.innerText = "تم النسخ بنجاح!";
        msg.style.color = "#4ade80";
        
        setTimeout(() => {
            msg.innerText = "اضغط على الكود للنسخ السريع";
            msg.style.color = "#00d2ff";
        }, 2000);
    }
</script>

</body>
</html>
