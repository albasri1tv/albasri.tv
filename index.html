<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a18;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #00d2ff;
            --secondary: #3a7bd5;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at center, #102a5a 0%, #050a18 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            margin-bottom: 15px;
            border: 2px solid var(--accent);
            padding: 5px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        h1 { font-size: 24px; font-weight: 900; margin: 5px 0; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: #aaa; margin-bottom: 25px; }

        .image-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .image-group img {
            width: 30%;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .image-group img:hover { transform: scale(1.05); border-color: var(--accent); }

        .btn {
            position: relative;
            display: block;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            transition: 0.3s;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .btn:hover::before { left: 100%; }
        .btn:active { transform: scale(0.96); }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
        }

        .tv-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 25px;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }
        .tv-box label { display: block; font-size: 12px; color: #888; margin-bottom: 10px; }
        
        .code-display {
            background: #000;
            color: var(--accent);
            font-size: 28px;
            font-weight: 900;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 4px;
            border: 1px solid #1a2a4a;
            transition: 0.3s;
            display: inline-block;
            width: 80%;
        }
        .code-display:active { background: #111; transform: scale(0.95); }

        .copy-hint { font-size: 10px; color: var(--accent); margin-top: 8px; display: block; opacity: 0.7; }

        .footer { margin-top: 25px; font-size: 11px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://up6.cc/2026/04/177610707754814.jpg" alt="البصري تي في" class="logo">
    <h1>البصري تيفي ALBASRI TV</h1>
    <p class="subtitle">التطبيق الأقوى لمشاهدة المحتوى التقني والرياضي</p>

    <div class="image-group">
        <img src="https://up6.cc/2026/04/177610707742171.jpg" alt="ALBASRI TV Screenshot 1">
        <img src="https://up6.cc/2026/04/177610707751573.jpg" alt="ALBASRI TV Screenshot 2">
        <img src="https://up6.cc/2026/04/177610707748052.jpg" alt="ALBASRI TV Screenshot 3">
    </div>

    <div class="btns">
        <a href="https://www.mediafire.com/file/aqv1m6qldnd3k7h/ALBASRI+TV.apk/file" class="btn">تحميل نسخة الموبايل (APK)</a>
        <a href="https://play.google.com/store/apps/details?id=com.btv.video.player&hl=ar" class="btn btn-outline">تحميل المشغل </a>

        <div class="code-display" id="tvCode" onclick="copyCode()">556677</div>
        <span class="copy-hint" id="copyText">اضغط على الكود لنسخه سريعاً</span>
    </div>

    <div class="footer">
        DESIGNED BY ROMEO &copy; 2026
    </div>
</div>

<script>
    function copyCode() {
        const code = document.getElementById('tvCode').innerText;
        navigator.clipboard.writeText(code);
        
        const hint = document.getElementById('copyText');
        hint.innerText = "تم النسخ بنجاح!";
        hint.style.color = "#22c55e";
        
        setTimeout(() => {
            hint.innerText = "اضغط على الكود لنسخه سريعاً";
            hint.style.color = "#00d2ff";
        }, 2000);
    }
</script>

</body>
